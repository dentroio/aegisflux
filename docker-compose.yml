services:
  nats:
    image: nats:2.10-alpine
    ports:
      - "${NATS_CLIENT_PORT:-4222}:4222"   # client port
      - "${NATS_MONITOR_PORT:-8222}:8222"   # monitoring port
    command: ["--jetstream", "-m", "8222", "-DV"]

  timescale:
    image: timescale/timescaledb:latest-pg15
    environment:
      - POSTGRES_DB=aegisflux
      - POSTGRES_USER=postgres
      - POSTGRES_PASSWORD=password
    ports:
      - "5432:5432"
    volumes:
      - timescale_data:/var/lib/postgresql/data

  neo4j:
    image: neo4j:5.15-community
    environment:
      - NEO4J_AUTH=neo4j/password
      - NEO4J_PLUGINS=["apoc"]
    ports:
      - "${NEO4J_HTTP_PORT:-7474}:7474"
      - "${NEO4J_BOLT_PORT:-7687}:7687"
    volumes:
      - neo4j_data:/data

  vault:
    image: hashicorp/vault:1.16
    container_name: aegisflux-vault
    environment:
      VAULT_DEV_ROOT_TOKEN_ID: root
      VAULT_DEV_LISTEN_ADDRESS: 0.0.0.0:8200
    ports:
      - "8200:8200"
    cap_add: ["IPC_LOCK"]
    volumes:
      - vault-data:/vault/file
    command: >
      sh -c "vault server -dev -dev-root-token-id=${VAULT_DEV_ROOT_TOKEN_ID:-root}
      -dev-listen-address=${VAULT_DEV_LISTEN_ADDRESS:-0.0.0.0:8200}"

  config-api:
    build: backend/config-api
    depends_on: [nats, vault, timescale, neo4j]
    ports:
      - "8085:8085"
    environment:
      - CONFIG_API_PORT=8085
      - CONFIG_API_HOST=0.0.0.0
      - NATS_URL=nats://nats:4222
      - VAULT_ADDR=http://vault:8200
      - VAULT_TOKEN=root
      - PG_HOST=timescale
      - PG_PORT=5432
      - PG_DB=aegisflux
      - PG_USER=postgres
      - PG_PASSWORD=password
      - NEO4J_URI=bolt://neo4j:7687
      - NEO4J_USER=neo4j
      - NEO4J_PASSWORD=password

  ingest:
    build: backend/ingest
    depends_on: [nats]
    ports:
      - "50052:50051"
      - "9091:9090"
    environment:
      - NATS_URL=nats://nats:4222
      
  etl-enrich:
    build: backend/etl-enrich
    depends_on: [nats, timescale, neo4j]
    ports:
      - "8088:8088"
    environment:
      - NATS_URL=nats://nats:4222
      - ETL_HTTP_HOST=0.0.0.0
      - ETL_HTTP_PORT=8088
      - PG_HOST=timescale
      - PG_PORT=5432
      - PG_DB=aegisflux
      - PG_USER=postgres
      - PG_PASSWORD=password
      - NEO4J_URI=bolt://neo4j:7687
      - NEO4J_USER=neo4j
      - NEO4J_PASSWORD=password
      - AF_ENV=dev
      - AF_FAKE_RDNS=true

  correlator:
    build: backend/correlator
    depends_on: [nats, config-api]
    ports:
      - "8082:8082"
    environment:
      - CORR_NATS_URL=nats://nats:4222
      - CORR_HTTP_ADDR=:8082
      - CONFIG_API_URL=http://config-api:8085
      - CORR_HOT_RELOAD=false

  decision:
    build: backend/decision
    depends_on: [nats, neo4j, config-api]
    ports:
      - "8087:8087"
    environment:
      - DECISION_NATS_URL=nats://nats:4222
      - DECISION_HTTP_ADDR=:8087
      - CONFIG_API_URL=http://config-api:8085
      - NEO4J_URI=bolt://neo4j:7687
      - NEO4J_USER=neo4j
      - NEO4J_PASSWORD=password

  segmenter:
    build: backend/segmenter
    ports:
      - "8086:8086"
    environment:
      - SEG_HTTP_ADDR=:8086

  orchestrator:
    build:
      context: .
      dockerfile: backend/orchestrator/Dockerfile
    depends_on: [vault, nats]
    ports:
      - "${ORCHESTRATOR_HTTP_PORT:-8084}:8084"
    environment:
      - NATS_URL=nats://nats:4222
      - ORCH_HTTP_ADDR=:8084
      - VAULT_ADDR=http://vault:8200
      - VAULT_TOKEN=root
      - ORCHESTRATOR_LOG_LEVEL=INFO

  bpf-registry:
    build: backend/bpf-registry
    depends_on: [vault, nats]
    ports:
      - "8090:8090"
    environment:
      - NATS_URL=nats://nats:4222
      - VAULT_ADDR=http://vault:8200
      - VAULT_TOKEN=root
      - BPF_REGISTRY_PORT=8081
      - BPF_REGISTRY_HOST=0.0.0.0

  websocket-gateway:
    build: backend/websocket-gateway
    depends_on: [nats, timescale]
    ports:
      - "8080:8080"
    environment:
      - NATS_URL=nats://nats:4222
      - ACTIONS_API_URL=${ACTIONS_API_URL:-http://actions-api:8083}
      - WS_GATEWAY_PORT=8080
      - WS_GATEWAY_HOST=0.0.0.0
      - PG_HOST=timescale
      - PG_PORT=5432
      - PG_DB=aegisflux
      - PG_USER=postgres
      - PG_PASSWORD=password

  actions-api:
    build: backend/actions-api
    depends_on: [nats]
    ports:
      - "8083:8083"
    environment:
      - NATS_URL=nats://nats:4222
      - ACTIONS_API_PORT=8083
      - ACTIONS_API_HOST=0.0.0.0

volumes:
  timescale_data:
  neo4j_data:
  vault-data:
